<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLENERACK | CONFIGURATOR</title>
    <style>
        :root { 
            --bg: #121212; 
            --card: #1e1e1e; 
            --accent: #00d4ff; 
            --text: #e0e0e0; 
            --input: #2a2a2a; 
            --table-text: #333;
        }
        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        .container { max-width: 900px; width: 100%; }
        header { 
            width: 100%; 
            margin-bottom: 30px; 
            border-bottom: 1px solid #333; 
            padding-bottom: 10px; 
            text-align: center;
        }
        header h1 { font-size: 1.6rem; letter-spacing: 2px; color: #fff; margin: 0; }
        header span { font-weight: 300; color: var(--accent); }
        
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 20px; 
            margin-bottom: 30px; 
        }
        .card { 
            background: var(--card); 
            padding: 20px; 
            border-radius: 12px; 
            border: 1px solid #333; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); 
        }
        .card h2 { 
            font-size: 0.9rem; 
            color: #888; 
            text-transform: uppercase; 
            margin-top: 0; 
            border-left: 3px solid var(--accent); 
            padding-left: 10px; 
            margin-bottom: 20px;
        }
        
        label { display: block; font-size: 0.8rem; margin: 15px 0 5px; color: #bbb; }
        select, input { 
            background: var(--input); 
            color: var(--accent); 
            border: 1px solid #444; 
            padding: 12px; 
            width: 100%; 
            border-radius: 6px; 
            box-sizing: border-box; 
            font-size: 1rem;
            outline: none;
        }
        select:focus, input:focus { border-color: var(--accent); }
        
        .bom-container { 
            background: #fff; 
            border-radius: 8px; 
            overflow: hidden; 
            margin-top: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        table { width: 100%; border-collapse: collapse; color: var(--table-text); font-size: 0.9rem; }
        th { background: #f4f4f4; padding: 15px; text-align: left; border-bottom: 2px solid #ddd; font-weight: 600; text-transform: uppercase; font-size: 0.75rem; }
        td { padding: 12px 15px; border-bottom: 1px solid #eee; }
        .qty-col { font-weight: bold; color: #000; text-align: center; width: 60px; background: #f9f9f9; }
        
        .loading { text-align: center; padding: 20px; color: var(--accent); font-style: italic; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>CLENERACK | <span>CONFIGURATOR</span></h1>
    </header>

    <div id="loader" class="loading">Initializing data from Google Sheets...</div>

    <div id="mainContent" class="hidden">
        <div class="grid">
            <div class="card">
                <h2>ROOFTOP CONFIG</h2>
                <label>Roof Interface</label>
                <select id="roofType" onchange="updateBOM()">
                    <option value="Tile Hook">Tile Hook</option>
                    <option value="IBR">IBR Interface</option>
                    <option value="Corrugated">Corrugated Interface</option>
                </select>
                <label>Panel Quantity</label>
                <input type="number" id="roofPanelQty" value="0" min="0" oninput="updateBOM()">
                <label>Number of Strings (Multiplier)</label>
                <input type="number" id="roofStrings" value="1" min="1" oninput="updateBOM()">
            </div>

            <div class="card">
                <h2>GROUND MOUNT CONFIG</h2>
                <label>Table Size</label>
                <select id="groundSize" onchange="updateBOM()">
                    <option value="None">-- Select Size --</option>
                    <option value="12">12 Panel Table</option>
                    <option value="18">18 Panel Table</option>
                </select>
                <label>Number of Tables (Multiplier)</label>
                <input type="number" id="groundTables" value="0" min="0" oninput="updateBOM()">
            </div>
        </div>

        <div class="card" style="max-width: 100%; background: transparent; border: none; padding: 0;">
            <h2 style="color: #fff;">BILL OF MATERIALS</h2>
            <div class="bom-container">
                <table id="bomTable">
                    <thead>
                        <tr>
                            <th>Stock Code</th>
                            <th>Description</th>
                            <th style="text-align:center">Total Qty</th>
                        </tr>
                    </thead>
                    <tbody>
                        </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    let db = { rooftop: [], ground: [] };
    const apiUrl = 'https://script.google.com/macros/s/AKfycbwOp4wqhAy6knch--Uhcz_iSLvAzMiVN3OZfsmgVa75vXaOF--FPap_RuuPidaYd8Mr/exec';

    async function init() {
        try {
            const resp = await fetch(apiUrl);
            db = await resp.json();
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            updateBOM();
        } catch (e) {
            document.getElementById('loader').innerHTML = "Error loading data. Please check permissions.";
            console.error("Loading Error", e);
        }
    }

    function updateBOM() {
        const tbody = document.querySelector('#bomTable tbody');
        tbody.innerHTML = '';

        // --- ROOFTOP LOGIC ---
        const rType = document.getElementById('roofType').value;
        const rQty = document.getElementById('roofPanelQty').value;
        const rStrings = parseFloat(document.getElementById('roofStrings').value) || 0;
        
        // Match the "Tile Hook 10" format from your DATA sheet
        const rSearchName = `${rType} ${rQty}`;
        const rItems = db.rooftop.filter(i => String(i.kitName).trim() === rSearchName.trim());

        // --- GROUND MOUNT LOGIC ---
        const gSize = document.getElementById('groundSize').value;
        const gTables = parseFloat(document.getElementById('groundTables').value) || 0;
        
        // Match the "12 Panel Ground Mount" format
        const gSearchName = `${gSize} Panel Ground Mount`;
        const gItems = db.ground.filter(i => String(i.kitName).trim() === gSearchName.trim());

        // --- COMBINE AND RENDER ---
        const finalBOM = [
            ...rItems.map(i => ({...i, multiplier: rStrings})),
            ...gItems.map(i => ({...i, multiplier: gTables}))
        ];

        if (finalBOM.length === 0) {
            tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; padding: 20px; color: #999;">No items found. Adjust inputs to generate BOM.</td></tr>';
            return;
        }

        finalBOM.forEach(item => {
            const row = `<tr>
                <td style="font-family: monospace; font-weight: bold;">${item.stockCode}</td>
                <td>${item.description}</td>
                <td class="qty-col">${Math.ceil(item.qty * item.multiplier)}</td>
            </tr>`;
            tbody.innerHTML += row;
        });
    }

    // Run on startup
    init();
</script>
</body>
</html>
